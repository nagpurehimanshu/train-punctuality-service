name: Daily Train Data Collection

on:
  schedule:
    # 3 runs/day: 6 AM, 2 PM, 10 PM IST (00:30, 08:30, 16:30 UTC)
    - cron: '30 0 * * *'
    - cron: '30 8 * * *'
    - cron: '30 16 * * *'
  workflow_dispatch:
    inputs:
      train_number:
        description: 'Single train number (leave empty for all)'
        required: false
      backfill:
        description: 'Store all dates shown, not just latest'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements-collector.txt
          playwright install chromium

      - name: Start SOCKS proxy via Oracle VM
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ORACLE_SSH_KEY }}
          ORACLE_VM_IP: ${{ secrets.ORACLE_VM_IP }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/oracle_key
          chmod 600 ~/.ssh/oracle_key
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -o ServerAliveInterval=60 -o ServerAliveCountMax=5 \
            -D 1080 -f -N \
            -i ~/.ssh/oracle_key opc@$ORACLE_VM_IP
          echo "SOCKS proxy started on localhost:1080"

      - name: Run collector
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          PROXY_SERVER: socks5://localhost:1080
        run: |
          if [ -n "${{ github.event.inputs.train_number }}" ]; then
            python -m src.collector.daily_collector --train ${{ github.event.inputs.train_number }} ${{ github.event.inputs.backfill == 'true' && '--backfill' || '' }}
          else
            python -m src.collector.daily_collector --all
          fi
